spring:
  application:
    name: eagle-leap-api-spring
  datasource:
    url: jdbc:mysql://localhost:3306/eagleleap
    username: root
    password: root
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

app:
  jwt-secret: change-me-to-a-long-random-string
